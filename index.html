<!DOCTYPE HTML>
<html>
<head>
  <title>Bad Reserveren</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1583416750470-965b2707b355') center/cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 20px;
    }

    button {
      background: #007BFF;
      color: white;
      padding: 15px;
      border: none;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .success {
      display: none;
      text-align: center;
      color: green;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Welkom bij ons bad 🛁</h1>
    <p>Reserveer eenvoudig jouw moment van ontspanning hieronder</p>
  </div>

  <div class="container">

    <form id="form" action="https://formspree.io/f/mnjloeny" method="POST">

      <label>Naam</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Telefoonnummer</label>
      <input type="tel" name="phone" required>

      <label>Datum</label>
      <input type="date" name="date" required>

      <label>Tijdslot</label>
      <select name="time" required>
        <option value="">Kies een tijd</option>
        <option>09:00 - 10:00</option>
        <option>10:00 - 11:00</option>
        <option>11:00 - 12:00</option>
        <option>13:00 - 14:00</option>
        <option>14:00 - 15:00</option>
      </select>

      <button type="submit">Reserveer nu</button>

    </form>

    <p class="success" id="successMessage">
      ✅ Bedankt! Je reservering is verzonden.
    </p>

  </div>

  <script>
    const form = document.getElementById("form");
    const successMessage = document.getElementById("successMessage");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const data = new FormData(form);

      const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        form.style.display = "none";
        successMessage.style.display = "block";
      } else {
        alert("Er ging iets mis. Probeer opnieuw.");
      }
    });
  </script>

</body>
</html>
