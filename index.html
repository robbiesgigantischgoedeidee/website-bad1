<!DOCTYPE HTML>
<html>
<head>
  <title>Bad Reserveren</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f5f7fa;
      color: #1a1a1a;
    }

    /* HERO */
    .hero {
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                  url('https://images.unsplash.com/photo-1583416750470-965b2707b355') center/cover;
      color: white;
      padding: 80px 20px 100px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.2em;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .hero p {
      font-size: 15px;
      opacity: 0.9;
    }

    /* CARD */
    .card {
      max-width: 480px;
      margin: -60px auto 40px;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .info {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    /* FORM */
    .field {
      margin-bottom: 18px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus, select:focus {
      border-color: #0a84ff;
      outline: none;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #0a84ff, #5ac8fa);
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(10,132,255,0.3);
    }

    /* SUCCESS */
    .success {
      display: none;
      text-align: center;
      color: green;
      font-weight: 500;
      padding: 20px;
    }

    /* MOBILE PERFECT */
    @media (min-width: 768px) {
      .hero h1 {
        font-size: 3em;
      }

      .card {
        padding: 35px;
      }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>🛁 Ontspan in ons privé bad</h1>
    <p>Reserveer jouw moment van rust in minder dan 1 minuut</p>
  </div>

  <!-- CARD -->
  <div class="card">

    <h2>Reserveer jouw moment</h2>
    <p class="info">Kies een datum en tijd. Wij regelen de rest.</p>

    <!-- FORM -->
    <form id="form" action="https://formspree.io/f/mnjloeny" method="POST">

      <div class="field">
        <label>Naam</label>
        <input type="text" name="name" required>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="field">
        <label>Telefoon</label>
        <input type="tel" name="phone" required>
      </div>

      <div class="field">
        <label>Datum</label>
        <input type="date" name="date" required>
      </div>

      <div class="field">
        <label>Tijdslot</label>
        <select name="time" required>
          <option value="">Kies een tijd</option>
          <option>09:00 - 10:00</option>
          <option>10:00 - 11:00</option>
          <option>11:00 - 12:00</option>
          <option>13:00 - 14:00</option>
          <option>14:00 - 15:00</option>
          <option>15:00 - 16:00</option>
          <option>16:00 - 17:00</option>
          <option>17:00 - 18:00</option>
          <option>18:00 - 19:00</option>
          <option>19:00 - 20:00</option>
          <option>20:00 - 21:00</option>
          <option>21:00 - 22:00</option>
        </select>
      </div>

      <button type="submit">Reserveer nu</button>

    </form>

    <div class="success" id="successMessage">
      ✅ Bedankt! We nemen snel contact met je op.
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    const form = document.getElementById("form");
    const successMessage = document.getElementById("successMessage");
    const button = form.querySelector("button");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      button.innerText = "Bezig...";
      button.disabled = true;

      const data = new FormData(form);

      const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        form.style.display = "none";
        successMessage.style.display = "block";
      } else {
        button.innerText = "Reserveer nu";
        button.disabled = false;
        alert("Er ging iets mis.");
      }
    });
  </script>

</body>
</html>
