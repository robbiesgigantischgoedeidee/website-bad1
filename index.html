<!DOCTYPE HTML>
<html>
<head>
  <title>Privé Bad Experience</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f5f7fa;
    }

    .hero {
      background: url('https://cloud.funda.nl/valentina_media/225/597/311.jpg?options=width=2160') center/cover;
      color: white;
      padding: 100px 20px;
      text-align: center;
    }

    .card {
      max-width: 480px;
      margin: -50px auto;
      background: white;
      padding: 25px;
      border-radius: 20px;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .slot {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }

    .slot.active {
      background: #0a84ff;
      color: white;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #0a84ff;
      color: white;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🛁 Privé bad reserveren</h1>
</div>

<div class="card">

<form id="form">

<input type="text" name="name" placeholder="Naam" required>
<input type="email" name="email" placeholder="Email" required>

<input type="text" id="datePicker" placeholder="Datum" required>

<div id="slots" class="slots"></div>
<input type="hidden" id="time">

<button>Reserveer</button>

</form>

</div>

<script>
// 🔑 SUPABASE CONFIG
const SUPABASE_URL = "JOUW_URL_HIER";
const SUPABASE_KEY = "JOUW_ANON_KEY_HIER";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 📅 kalender
flatpickr("#datePicker", {
  minDate: "today",
  dateFormat: "Y-m-d",
  onChange: loadSlots
});

// 🕒 slots
const times = [
  "09:00 - 10:00","10:00 - 11:00","11:00 - 12:00",
  "13:00 - 14:00","14:00 - 15:00","15:00 - 16:00"
];

const container = document.getElementById("slots");
const selectedTime = document.getElementById("time");

async function loadSlots(selectedDates, dateStr) {
  container.innerHTML = "";

  const { data } = await supabase
    .from("bookings")
    .select("time")
    .eq("date", dateStr);

  const booked = data.map(b => b.time);

  times.forEach(t => {
    if (booked.includes(t)) return;

    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = t;

    div.onclick = () => {
      document.querySelectorAll(".slot").forEach(s => s.classList.remove("active"));
      div.classList.add("active");
      selectedTime.value = t;
    };

    container.appendChild(div);
  });
}

// 📩 submit
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const date = document.getElementById("datePicker").value;
  const time = selectedTime.value;

  if (!time) {
    alert("Kies een tijd");
    return;
  }

  const { error } = await supabase
    .from("bookings")
    .insert([{ date, time }]);

  if (error) {
    alert("Slot net volgeboekt");
    loadSlots([], date);
    return;
  }

  alert("Gereserveerd!");
});
</script>

</body>
</html>
