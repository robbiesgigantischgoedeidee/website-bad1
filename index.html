<!DOCTYPE HTML>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<html>
<head>
  <title>Bad Reserveren</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f7f9fc;
  color: #333;
}

.hero {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
              url('https://images.unsplash.com/photo-1583416750470-965b2707b355') center/cover;
  color: white;
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 3em;
  margin-bottom: 10px;
  font-weight: 600;
}

.hero p {
  opacity: 0.9;
}

.container {
  max-width: 500px;
  margin: -60px auto 40px auto;
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

label {
  font-weight: 500;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #ddd;
  transition: 0.2s;
}

input:focus, select:focus {
  border-color: #007BFF;
  outline: none;
}

button {
  background: linear-gradient(135deg, #007BFF, #00c6ff);
  color: white;
  padding: 15px;
  border: none;
  width: 100%;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,123,255,0.3);
}

.success {
  display: none;
  text-align: center;
  color: green;
  font-weight: 500;
}
  </style>
</head>

<body>

  <div class="hero">
    <h1>Welkom bij ons bad 🛁</h1>
    <p>Reserveer eenvoudig jouw moment van ontspanning hieronder</p>
  </div>

  <div class="container">

    <form id="form" action="https://formspree.io/f/mnjloeny" method="POST">

      <label>Naam</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Telefoonnummer</label>
      <input type="tel" name="phone" required>

      <label>Datum</label>
      <input type="date" name="date" required>

      <label>Tijdslot</label>
      <select name="time" required>
        <option value="">Kies een tijd</option>
        <option>09:00 - 10:00</option>
        <option>10:00 - 11:00</option>
        <option>11:00 - 12:00</option>
        <option>13:00 - 14:00</option>
        <option>14:00 - 15:00</option>
        <option>15:00 - 16:00</option>
        <option>16:00 - 17:00</option>
        <option>17:00 - 18:00</option>
        <option>18:00 - 19:00</option>
        <option>19:00 - 20:00</option>
        <option>20:00 - 21:00</option>
        <option>21:00 - 22:00</option>
      </select>

      <button type="submit">Reserveer nu</button>

    </form>

    <p class="success" id="successMessage">
      ✅ Bedankt! Je reserveringsaanvraag is verzonden.
    </p>

  </div>

  <script>
    const form = document.getElementById("form");
    const successMessage = document.getElementById("successMessage");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const data = new FormData(form);

      const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        form.style.display = "none";
        successMessage.style.display = "block";
      } else {
        alert("Er ging iets mis. Probeer opnieuw.");
      }
    });
  </script>

</body>
</html>
```
