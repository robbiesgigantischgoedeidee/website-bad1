<!DOCTYPE HTML>
<html>
<head>
  <title>Bad Reserveren</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Calendar library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #f5f7fa;
      color: #1a1a1a;
    }

    /* HERO */
    .hero {
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                  url('https://cloud.funda.nl/valentina_media/225/597/311.jpg?options=width=2160') center/cover;
      color: white;
      padding: 90px 20px 110px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.3em;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .hero p {
      opacity: 0.9;
      font-size: 15px;
    }

    /* CARD */
    .card {
      max-width: 480px;
      margin: -60px auto 40px;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .info {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    /* FORM */
    .field {
      margin-bottom: 18px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      border-color: #0a84ff;
      outline: none;
    }

    /* TIME SLOTS */
    .slots {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .slot {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
      background: #fff;
      user-select: none;
    }

    .slot:hover {
      border-color: #0a84ff;
      transform: translateY(-1px);
    }

    .slot.active {
      background: linear-gradient(135deg, #0a84ff, #5ac8fa);
      color: white;
      border-color: transparent;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #0a84ff, #5ac8fa);
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(10,132,255,0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* SUCCESS */
    .success {
      display: none;
      text-align: center;
      color: green;
      font-weight: 500;
      padding: 20px;
    }

    /* MOBILE OPTIMIZED */
    @media (max-width: 500px) {
      .slots {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 2em;
      }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>🛁 Ontspan in ons privé bad</h1>
    <p>Wanneer kom jij langs?</p>
  </div>

  <!-- CARD -->
  <div class="card">

    <h2>Reserveer jouw moment</h2>
    <p class="info">Kies een datum en tijdslot</p>

    <form id="form" action="https://formspree.io/f/mnjloeny" method="POST">

      <div class="field">
        <label>Naam</label>
        <input type="text" name="name" required>
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="field">
        <label>Telefoon</label>
        <input type="tel" name="phone" required>
      </div>

      <!-- CALENDAR -->
      <div class="field">
        <label>Datum</label>
        <input type="text" id="datePicker" name="date" placeholder="Kies een datum" required>
      </div>

      <!-- TIME SLOTS -->
      <div class="field">
        <label>Tijdslot</label>
        <div id="timeSlots" class="slots"></div>
        <input type="hidden" name="time" id="selectedTime" required>
      </div>

      <button type="submit">Reserveer nu</button>

    </form>

    <div class="success" id="successMessage">
      ✅ Bedankt! Je reservering is verzonden.
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    // 📅 Calendar
    flatpickr("#datePicker", {
      minDate: "today",
      dateFormat: "Y-m-d"
    });

    // 🕒 Time slots
    const slots = [
      "09:00 - 10:00",
      "10:00 - 11:00",
      "11:00 - 12:00",
      "13:00 - 14:00",
      "14:00 - 15:00",
      "15:00 - 16:00",
      "16:00 - 17:00",
      "17:00 - 18:00",
      "18:00 - 19:00",
      "19:00 - 20:00",
      "20:00 - 21:00",
      "21:00 - 22:00"
    ];

    const container = document.getElementById("timeSlots");
    const selectedTime = document.getElementById("selectedTime");

    slots.forEach(slot => {
      const div = document.createElement("div");
      div.className = "slot";
      div.innerText = slot;

      div.addEventListener("click", () => {
        document.querySelectorAll(".slot").forEach(s => s.classList.remove("active"));
        div.classList.add("active");
        selectedTime.value = slot;
      });

      container.appendChild(div);
    });

    // 📩 Form submit
    const form = document.getElementById("form");
    const successMessage = document.getElementById("successMessage");
    const button = form.querySelector("button");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      button.innerText = "Bezig...";
      button.disabled = true;

      const data = new FormData(form);

      const response = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        form.style.display = "none";
        successMessage.style.display = "block";
      } else {
        button.innerText = "Reserveer nu";
        button.disabled = false;
        alert("Er ging iets mis.");
      }
    });
  </script>

</body>
</html>
