<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad Reserveren</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    /* HERO */
    .hero {
      background: url('https://images.unsplash.com/photo-1583416750470-965b2707b355') center/cover;
      height: 45vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: white;
      text-align: center;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    .hero p {
      opacity: 0.9;
      margin-top: 10px;
    }

    /* CONTAINER */
    .wrap {
      max-width: 900px;
      margin: -60px auto 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 0 15px;
    }

    @media (max-width: 800px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }

    /* CARD */
    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    /* STEPS */
    .steps {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .step {
      flex: 1;
      height: 4px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .step.active { background: #000; }

    /* FORM */
    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    label {
      font-size: 13px;
      font-weight: 500;
    }

    /* TIME SLOTS */
    .slots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .slot {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }

    .slot:hover { border-color: #000; }

    .slot.active {
      background: #000;
      color: white;
      border-color: #000;
    }

    /* BUTTONS */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #000;
      color: white;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
    }

    .btn:disabled {
      opacity: 0.5;
    }

    .muted {
      font-size: 13px;
      color: #666;
    }

    /* RIGHT INFO */
    .info-box {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      height: fit-content;
    }

    .price {
      font-size: 22px;
      font-weight: 600;
    }

  </style>
</head>
<body>

<div class="hero">
  <div class="hero-content">
    <h1>Privé Bad Experience</h1>
    <p>Luxe ontspanning op jouw moment</p>
  </div>
</div>

<div class="wrap">

  <!-- FORM CARD -->
  <div class="card">

    <div class="steps">
      <div class="step active" id="s1"></div>
      <div class="step" id="s2"></div>
      <div class="step" id="s3"></div>
    </div>

    <form id="form" action="https://formspree.io/f/mnjloeny" method="POST">

      <label>Naam</label>
      <input name="name" required>

      <label>Email</label>
      <input name="email" type="email" required>

      <label>Telefoon</label>
      <input name="phone" required>

      <label>Datum</label>
      <input id="date" name="date" required>

      <label>Tijdslot</label>
      <div class="slots" id="slots"></div>
      <input type="hidden" name="time" id="time" required>

      <button class="btn" id="submitBtn">Reserveer</button>

    </form>

  </div>

  <!-- INFO CARD -->
  <div class="info-box">
    <div class="price">€29 p/ uur</div>
    <p class="muted">✔ Privé bad</p>
    <p class="muted">✔ Rustige omgeving</p>
    <p class="muted">✔ Handdoeken inbegrepen</p>
  </div>

</div>

<script>

flatpickr("#date", { minDate: "today" });

const times = [
"09:00 - 10:00","10:00 - 11:00","11:00 - 12:00",
"13:00 - 14:00","14:00 - 15:00","15:00 - 16:00",
"16:00 - 17:00","17:00 - 18:00","18:00 - 19:00"
];

const slots = document.getElementById("slots");
const timeInput = document.getElementById("time");

times.forEach(t => {
  const d = document.createElement("div");
  d.className = "slot";
  d.innerText = t;

  d.onclick = () => {
    document.querySelectorAll(".slot").forEach(s => s.classList.remove("active"));
    d.classList.add("active");
    timeInput.value = t;
  };

  slots.appendChild(d);
});

const form = document.getElementById("form");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btn.innerText = "Bezig...";
  btn.disabled = true;

  const res = await fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    headers: { Accept: "application/json" }
  });

  if (res.ok) {
    document.body.innerHTML = `<div style='text-align:center;padding:100px;font-family:Inter'>
      <h1>✅ Reservering ontvangen</h1>
      <p>We nemen snel contact op.</p>
    </div>`;
  } else {
    btn.innerText = "Reserveer";
    btn.disabled = false;
    alert("Fout, probeer opnieuw");
  }
});

</script>

</body>
</html>
